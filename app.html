<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小红书选题助手</title>
  <style>
    /* ============ 小红书浅色毛玻璃风格 ============ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF2442;
      --primary-light: rgba(255,36,66,0.08);
      --primary-hover: rgba(255,36,66,0.15);
      --bg: #F8F9FA;
      --glass-bg: rgba(255,255,255,0.72);
      --glass-bg-strong: rgba(255,255,255,0.88);
      --glass-bg-hover: rgba(255,255,255,0.9);
      --glass-border: rgba(0,0,0,0.06);
      --glass-border-strong: rgba(0,0,0,0.1);
      --text: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #888;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.08);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --radius-xl: 24px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(160deg, #F8F9FA 0%, #ffffff 40%, #FFF5F7 70%, #FFF0F3 100%);
      background-attachment: fixed;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
    }
    #root { min-height: 100vh; }
    .page { display: none; min-height: 100vh; padding-bottom: 70px; }
    .page.active { display: block; }

    /* ===== 头部 ===== */
    .page-header {
      background: var(--glass-bg-strong);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--glass-border);
    }
    @media (min-width: 700px) { .page-header { padding: 24px 32px 20px; } }
    .page-header-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .page-header-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ===== 分类栏 ===== */
    .category-bar { background: transparent; padding: 0 0 12px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
    @media (min-width: 700px) { .category-bar { padding: 0 0 12px 32px; } }
    .category-bar::-webkit-scrollbar { display: none; }
    .category-list { display: inline-flex; padding: 0 16px; gap: 8px; }
    @media (min-width: 700px) { .category-list { flex-wrap: wrap; padding: 0; } }
    .category-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .category-chip:hover { background: var(--glass-bg-hover); border-color: var(--glass-border-strong); }
    .category-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(255,36,66,0.3);
    }

    /* ===== 卡片网格 ===== */
    .topic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px 16px;
    }
    @media (min-width: 700px) { .topic-grid { grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 16px 24px; } }
    @media (min-width: 1000px) { .topic-grid { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; padding: 20px 32px; } }
    .topic-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-md);
      padding: 16px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: all 0.2s;
    }
    .topic-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--glass-border-strong); }
    .topic-card:active { transform: scale(0.98); }

    .card-trend-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .trend-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .trend-badge.hot { background: #FFF0F3; color: #FF2442; }
    .trend-badge.up { background: #FFF5F0; color: #FF6B35; }
    .trend-badge.new { background: #F0FFF0; color: #4CAF50; }
    .fav-btn { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-muted); display: flex; align-items: center; font-size: 18px; transition: color 0.2s; }
    .fav-btn:hover { color: var(--text-secondary); }
    .fav-btn.liked { color: var(--primary); }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 42px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .card-tag {
      background: #F5F5F5;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .card-bottom { display: flex; justify-content: space-between; align-items: center; }
    .card-heat { font-size: 11px; color: var(--text-muted); }
    .card-date { font-size: 11px; color: #bbb; }

    /* ===== 搜索栏 ===== */
    .search-header {
      background: var(--glass-bg-strong);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px 16px;
      border-bottom: 1px solid var(--glass-border);
    }
    @media (min-width: 700px) { .search-header { padding: 12px 32px; } }
    .search-bar {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      padding: 0 12px;
      height: 42px;
      gap: 8px;
      border: 1px solid var(--glass-border-strong);
    }
    .search-bar:focus-within { border-color: var(--primary); }
    .search-bar span { color: var(--text-muted); font-size: 18px; }
    .search-input { flex: 1; border: none; background: none; font-size: 15px; outline: none; color: var(--text); }
    .search-input::placeholder { color: #999; }
    .search-clear { background: none; border: none; cursor: pointer; color: #999; padding: 4px; font-size: 16px; }

    /* ===== 空状态 ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      text-align: center;
    }
    .empty-state .icon { font-size: 48px; color: #ddd; margin-bottom: 20px; }
    .empty-title { font-size: 16px; color: var(--text-muted); font-weight: 500; }
    .empty-hint { font-size: 13px; color: #bbb; margin-top: 8px; }
    .btn-primary {
      margin-top: 24px;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }

    /* ===== AI 卡片 ===== */
    .ai-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin: 16px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-md);
    }
    @media (min-width: 700px) { .ai-card { margin: 16px 24px; padding: 28px; } }
    .ai-label { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 10px; }
    .ai-input {
      width: 100%;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--glass-border-strong);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      color: var(--text);
      transition: all 0.2s;
    }
    .ai-input:focus { border-color: var(--primary); background: #fff; }
    .ai-input::placeholder { color: #bbb; }

    .category-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-chip {
      padding: 8px 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .cat-chip:hover { background: var(--glass-bg-hover); }
    .cat-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .generate-btn {
      margin-top: 24px;
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:disabled { background: #FFB3C1; cursor: not-allowed; }

    .generating-box { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; }
    .pulse-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .pulse-circle span { color: #fff; font-size: 28px; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .generating-title { font-size: 17px; font-weight: 600; color: #333; margin-top: 28px; }
    .generating-hint { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

    .result-section { margin: 16px; }
    @media (min-width: 700px) { .result-section { margin: 16px 24px; } }
    .result-cards-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 700px) { .result-cards-list { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1000px) { .result-cards-list { grid-template-columns: 1fr 1fr 1fr; } }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .result-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .regenerate-link { font-size: 14px; color: var(--primary); font-weight: 500; background: none; border: none; cursor: pointer; }

    .result-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-md);
      padding: 18px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: all 0.2s;
    }
    .result-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .result-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .score-badge {
      background: var(--primary-light);
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }
    .cat-badge {
      background: rgba(0,0,0,0.04);
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .result-card-title { font-size: 16px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
    .result-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }
    .result-keywords { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .result-kw {
      background: rgba(0,0,0,0.03);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .view-detail { text-align: right; font-size: 13px; color: var(--primary); font-weight: 500; }
    .result-actions { display: flex; gap: 8px; margin-top: 12px; }
    .result-action-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      min-height: 38px;
      border: 1px solid var(--glass-border-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text-secondary);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .result-action-btn.active { color: var(--primary); border-color: rgba(255,36,66,0.28); background: var(--primary-light); }
    .result-action-btn.plan-active { color: #2E7D32; border-color: rgba(46,125,50,0.25); background: rgba(46,125,50,0.08); }
    .result-action-btn:hover { border-color: var(--primary); color: var(--primary); }
    .regenerate-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--primary);
      border-radius: 12px;
      color: var(--primary);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .regenerate-btn:hover { background: var(--primary-light); }

    /* ===== 详情页 ===== */
    .detail-container { padding-bottom: 80px; }
    .detail-content { padding: 20px; }
    @media (min-width: 700px) { .detail-content { padding: 24px 32px; max-width: 800px; } }
    .detail-banner {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }
    .detail-banner.hot { background: #FFF0F3; }
    .detail-banner.up { background: #FFF5F0; }
    .detail-banner.new { background: #F0FFF0; }
    .detail-banner-left { font-size: 14px; font-weight: 600; }
    .detail-cat-badge {
      background: rgba(0,0,0,0.06);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
    }
    .detail-title { font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }
    .detail-info {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 16px;
    }
    .detail-heat { font-size: 13px; color: var(--text-muted); }
    .detail-date { font-size: 13px; color: #bbb; }
    .detail-section { margin-bottom: 20px; }
    .detail-section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 10px; }
    .detail-desc { font-size: 15px; color: #444; line-height: 1.6; }
    .detail-keywords { display: flex; flex-wrap: wrap; gap: 8px; }
    .detail-kw {
      background: var(--primary-light);
      padding: 6px 12px;
      border-radius: 14px;
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
    }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .detail-tag {
      background: rgba(0,0,0,0.04);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
    }
    .tip-card {
      background: #FFFBEB;
      border-radius: 12px;
      padding: 16px;
    }
    .tip-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; }
    .tip-item:last-child { margin-bottom: 0; }
    .tip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #FFB800;
      flex-shrink: 0;
      margin-top: 8px;
    }
    .tip-item-body { flex: 1; min-width: 0; }
    .tip-label { font-size: 12px; font-weight: 600; color: #B8860B; margin-bottom: 3px; }
    .tip-text { font-size: 13px; color: var(--text-secondary); line-height: 1.55; display: block; }

    .detail-bottom-bar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 1200px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex; align-items: center;
      padding: 12px 20px 28px;
      border-top: 1px solid var(--glass-border-strong);
      gap: 20px;
      z-index: 20;
    }
    .bottom-action {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: none; border: none;
      cursor: pointer; font-size: 11px;
      color: var(--text-secondary);
      transition: color 0.2s;
    }
    .bottom-action .icon { font-size: 22px; }
    .bottom-action.active { color: var(--primary); }
    .bottom-action:hover { color: var(--text); }
    .use-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--primary);
      color: #fff; border: none;
      padding: 12px;
      border-radius: 24px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .use-btn:hover { opacity: 0.9; }
    .use-btn.adopted { background: #2E7D32; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #333;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px; font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid var(--glass-border-strong);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    .toast.show { opacity: 1; }
    .toast-error {
      background: rgba(255, 235, 238, 0.95);
      color: #C62828;
      border-color: #FFCDD2;
    }

    /* ===== 底部导航 ===== */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 1200px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      border-top: 1px solid var(--glass-border-strong);
      z-index: 20;
    }
    .tab-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 6px 0 8px;
      cursor: pointer;
      background: none; border: none;
      color: var(--text-muted);
      font-size: 11px; font-weight: 500;
      gap: 2px;
      transition: color 0.2s;
    }
    .tab-item .icon { font-size: 22px; }
    .tab-item:hover { color: var(--text-secondary); }
    .tab-item.active { color: var(--primary); }

    ::-webkit-scrollbar { width: 0; }

    .back-btn {
      background: none; border: none;
      cursor: pointer;
      color: var(--primary);
      padding: 8px;
      display: flex; align-items: center; gap: 4px;
      font-size: 15px; font-weight: 500;
    }
    .detail-header {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 12px 20px;
      border-bottom: 1px solid var(--glass-border-strong);
      display: flex; align-items: center; gap: 8px;
    }
    @media (min-width: 700px) { .detail-header { padding: 12px 32px; } }

    /* ===== 违禁词检测 ===== */
    .compliance-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
      margin-left: 6px;
    }
    .compliance-badge.danger { background: rgba(255,205,210,0.6); color: #D32F2F; }
    .compliance-badge.warning { background: rgba(255,224,178,0.6); color: #E65100; }
    .compliance-badge.caution { background: rgba(255,249,196,0.6); color: #F57F17; }
    .compliance-badge.notice { background: rgba(197,202,233,0.6); color: #3949AB; }
    .compliance-badge.safe { background: rgba(200,230,201,0.6); color: #2E7D32; }

    .compliance-box {
      border-radius: var(--radius-md);
      padding: 16px;
      margin-top: 12px;
      border: 1px solid var(--glass-border);
    }
    .compliance-box.danger { background: rgba(255,245,245,0.85); }
    .compliance-box.warning { background: rgba(255,248,240,0.85); }
    .compliance-box.caution { background: rgba(255,253,231,0.85); }
    .compliance-box.notice { background: rgba(245,247,255,0.85); }
    .compliance-box.safe { background: rgba(241,248,244,0.85); }
    .compliance-box-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .compliance-box-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; }
    .compliance-word-tag {
      display: inline-block;
      background: rgba(0,0,0,0.06);
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin: 2px 4px 2px 0;
    }
    .card-compliance-row { margin-top: 8px; display: flex; align-items: center; }

    /* ===== 免责声明 & API ===== */
    .disclaimer-bar {
      background: rgba(255,253,231,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--glass-border);
      padding: 10px 16px;
      font-size: 12px;

    function ic(name, size){
      let svg = _svgs[name]||'';
      if (size && svg) {
        svg = svg.replace(/width="[^"]*"/, `width="${size}"`).replace(/height="[^"]*"/, `height="${size}"`);
      }
      return svg;
    }

    async function _parseRes(res) {
      const text = await res.text();
      if (text.trim().startsWith('<')) {
        throw new Error('后端服务未响应，请先在终端运行 node server.js 启动服务');
      }
      let data;
      try { data = JSON.parse(text); } catch { throw new Error(text.slice(0, 200) || '请求失败'); }
      if (!res.ok) {
        throw new Error(data.error || data.message || ('请求失败 (' + res.status + ')'));
      }
      return data;
    }
    async function apiGet(path) {
      const res = await fetch(API_BASE + path, { headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {} });
      if (res.status === 401) { logout(); throw new Error('未登录'); }
      return _parseRes(res);
    }
    async function apiPost(path, body) {
      const res = await fetch(API_BASE + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...(authToken ? { 'Authorization': 'Bearer ' + authToken } : {}) },
        body: JSON.stringify(body)
      });
      if (res.status === 401) { logout(); throw new Error('未登录'); }
      return _parseRes(res);
    }
    async function apiPut(path, body) {
      const res = await fetch(API_BASE + path, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', ...(authToken ? { 'Authorization': 'Bearer ' + authToken } : {}) },
        body: JSON.stringify(body)
      });
      if (res.status === 401) { logout(); throw new Error('未登录'); }
      return _parseRes(res);
    }
    async function apiDelete(path) {
      const res = await fetch(API_BASE + path, {
        method: 'DELETE',
        headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {}
      });
      if (res.status === 401) { logout(); throw new Error('未登录'); }
      return _parseRes(res);
    }

    function logout() {
      authToken = '';
      currentUser = null;
      localStorage.removeItem('rb_token');
      localStorage.removeItem('rb_user');
      sessionStorage.removeItem('rb_token');

    function resolveAnalyzeImage(url) {
      if (!url) return '';
      if (url.startsWith('http') || url.startsWith('data:') || url.startsWith('blob:')) return url;
      const base = API_BASE.replace(/\/api\/?$/, '');
      return base + (url.startsWith('/') ? url : '/' + url);
    }

    function formatNum(n) {
      if (n >= 10000) return (n / 10000).toFixed(1) + '万';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return String(n);
    }

    async function handleAnalyze() {
      const input = document.getElementById('analyzeUrlInput');
      const url = input ? input.value.trim() : analyzeUrl.trim();
      if (!url) {
        analyzeError = '请先粘贴小红书笔记链接';
        render();
        return;
      }
      const useApi = getApiMode();
      const apiKey = useApi ? getApiKey() : '';
      const zhipuApiKey = useApi ? getZhipuApiKey() : '';
      if (useApi && !apiKey && !zhipuApiKey) {
        analyzeError = '请至少配置 DeepSeek 或智谱 API Key';
        render();
        return;
      }
      if (!useApi) {
        analyzeError = '';
      }
      analyzeUrl = url;
      analyzeLoading = true;
      analyzeError = '';
      analyzeResult = null;
      render();

      try {
        const data = await apiPost('/analyze/analyze', { url, apiKey, zhipuApiKey, zhipuVisionModel: getZhipuVisionModel() });
        if (data.error) {
          analyzeError = data.error;
        } else {
          analyzeResult = data;
          analyzeIsDemo = data.isDemo || false;
        }
      } catch (e) {
        analyzeError = e.message || '分析失败，请检查网络';
      }
      analyzeLoading = false;
      render();
    }

    function handleCopyReport() {
      if (!analyzeResult) return;
      const r = analyzeResult;
      const a = r.analysis || {};
      const b = r.baseInfo || {};
      const isVideoNote = (r.analysis?.noteType || a.noteType || b.noteType) === 'video';
      let text = '【爆款分析报告】\n\n';
      text += '标题：' + (a.title || b.title || '') + '\n';
      if (b.author) text += '作者：' + b.author + '\n';
      if (isVideoNote) text += '类型：视频笔记\n';
      text += '点赞：' + formatNum(b.likes || a.likes || 0) + ' | 收藏：' + formatNum(b.collects || a.collects || 0) + ' | 评论：' + formatNum(b.comments || a.comments || 0) + '\n';
      text += '综合评分：' + (a.overall_score || 0) + '/100\n\n';
      text += '🎯 标题钩子：' + (a.title_hook || '') + '（' + (a.title_score || 0) + '分）\n';
      text += '📝 ' + (isVideoNote ? '脚本结构' : '文案结构') + '：' + (a.content_structure || '') + '（' + (a.content_score || 0) + '分）\n';
      if (isVideoNote) {
        text += '⚡ 视频节奏：' + (a.video_pacing || '') + '（' + (a.video_pacing_score || 0) + '分）\n';
        text += '🎬 画面质量：' + (a.visual_quality || '') + '（' + (a.visual_score || 0) + '分）\n';
        text += '🎙️ 脚本/口播：' + (a.script_quality || '') + '（' + (a.script_score || 0) + '分）\n';
        if (a.videoScript) text += '\n📋 语音转写脚本：\n' + a.videoScript + '\n';
      } else {
        text += '📊 互动诊断：' + (a.interaction_rate || '') + '（' + (a.interaction_score || 0) + '分）\n';

    // 调用 DeepSeek API 生成选题（xhs-topic-strategist 风格）
    async function callDeepSeekAPI(keyword, category) {
      const apiKey = getApiKey();
      if (!apiKey) throw new Error('请先配置 API Key');

      const { buildTopicSystemPrompt, buildTopicUserPrompt, parseTopicApiResponse } = await xhsTopicPromise;
      if (!buildTopicSystemPrompt) throw new Error('选题模块加载中，请稍后重试');
      const catName = category ? categories.find(c => c.id === category)?.name : '';
      const validCats = categories.filter(c => c.id !== 'all').map(c => c.name).join('、');
      const [systemPrompt, userPrompt] = await Promise.all([
        buildTopicSystemPrompt(validCats),
        buildTopicUserPrompt(keyword, catName),
      ]);

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 45000);

      let response;
      try {
        response = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          signal: controller.signal,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt },
            ],
            temperature: 0.8,
            max_tokens: 1200,
          }),
        });
      } catch (e) {
        if (e.name === 'AbortError') throw new Error('DeepSeek 响应超时（45秒），请稍后重试');
        throw e;
      } finally {
        clearTimeout(timer);
      }

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API 请求失败 (${response.status})`);
      }

      const data = await response.json();
      const content = data.choices?.[0]?.message?.content || '';
      const parsed = parseTopicApiResponse(content, category);
      return parsed.map((item) => ({
        title: item.title,
        description: item.description,
        keywords: item.keywords,
        category: mapAiCategory(item.category, category),
        score: item.score,
      }));
    }

    function copyToClipboard(text) {
      function fallbackCopy() {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        ta.style.top = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        let success = false;
        try {
          success = document.execCommand('copy');
        } catch (e) { /* ignore */ }
        document.body.removeChild(ta);
        if (success) {
          showToast(ic('copy') + ' 内容已复制，去小红书粘贴吧');
        } else {
          showToast('复制失败，请手动复制');
        }
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast(ic('copy') + ' 内容已复制，去小红书粘贴吧')).catch(fallbackCopy);
      } else {
        fallbackCopy();
      }
    }

        if (newPassword.length < 6) { errEl.style.display = 'block'; errEl.textContent = '新密码至少需要6位'; return; }
        if (newPassword !== confirmPassword) { errEl.style.display = 'block'; errEl.textContent = '两次输入的新密码不一致'; return; }
        body.oldPassword = oldPassword;
        body.newPassword = newPassword;

    async function handleLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const rememberMe = document.getElementById('rememberMe')?.checked ?? true;
      const errEl = document.getElementById('loginError');
      if (!username || !password) { errEl.style.display = 'block'; errEl.textContent = '请填写用户名和密码'; return; }
      try {
        const res = await fetch(API_BASE + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, rememberMe })
        });
        const data = await res.json();
        if (!res.ok) { errEl.style.display = 'block'; errEl.textContent = data.error || '登录失败'; return; }
        authToken = data.token;
        currentUser = { id: data.userId, username: data.username };
        if (rememberMe) {
          localStorage.setItem('rb_token', authToken);
          localStorage.setItem('rb_user', JSON.stringify(currentUser));
          sessionStorage.removeItem('rb_token');
          sessionStorage.removeItem('rb_user');
        } else {
          sessionStorage.setItem('rb_token', authToken);
          sessionStorage.setItem('rb_user', JSON.stringify(currentUser));
          localStorage.removeItem('rb_token');
          localStorage.removeItem('rb_user');
        }
        await loadUserData();
        currentPage = 'home';
        render();
      } catch (e) { errEl.style.display = 'block'; errEl.textContent = '网络错误: ' + (e.message || '请检查后端是否启动'); console.error('登录错误:', e); }
    }

      const errEl = document.getElementById('loginError');

      if (password.length < 6) { errEl.style.display = 'block'; errEl.textContent = '密码至少需要6位'; return; }
      try {
        const res = await fetch(API_BASE + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, phone })
        });
        const data = await res.json();
        if (!res.ok) { errEl.style.display = 'block'; errEl.textContent = data.error || '注册失败'; return; }
        authToken = data.token;
        currentUser = { id: data.userId, username: data.username };
        localStorage.setItem('rb_token', authToken);
        localStorage.setItem('rb_user', JSON.stringify(currentUser));
        sessionStorage.removeItem('rb_token');
        sessionStorage.removeItem('rb_user');
        await initDefaultTopics();
        await loadUserData();
        currentPage = 'home';
        render();
      } catch (e) { errEl.style.display = 'block'; errEl.textContent = '网络错误: ' + (e.message || '请检查后端是否启动'); console.error('注册错误:', e); }
    }

    async function handleForgotPassword() {
      const username = document.getElementById('loginUsername').value.trim();
      const phone = document.getElementById('loginPhone')?.value?.trim() || '';
      const newPassword = document.getElementById('loginNewPassword')?.value || '';
      const errEl = document.getElementById('loginError');
      if (!username || !phone || !newPassword) { errEl.style.display = 'block'; errEl.textContent = '请填写完整信息'; return; }
      if (newPassword.length < 6) { errEl.style.display = 'block'; errEl.textContent = '新密码至少需要6位'; return; }
      try {
        const res = await fetch(API_BASE + '/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, phone, newPassword })
        });
        const data = await res.json();
        if (!res.ok) { errEl.style.display = 'block'; errEl.textContent = data.error || '重置失败'; return; }
        errEl.style.display = 'block';
        errEl.style.color = '#4CAF50';
        errEl.textContent = '密码重置成功，请用新密码登录';
        setTimeout(() => { loginMode = 'login'; render(); }, 1500);
      } catch (e) { errEl.style.display = 'block'; errEl.style.color = '#D32F2F'; errEl.textContent = '网络错误: ' + (e.message || '请检查后端是否启动'); console.error('重置错误:', e); }
    }

    async function loadTopics() {
      if (!authToken) { topics = []; return; }
      try { topics = await apiGet('/topics'); } catch { topics = []; }
    }

    function render() {
      if (!authToken && currentPage !== 'login') { currentPage = 'login'; }
      // Show/hide search bar based on page
      if (['favorites', 'plan'].includes(currentPage)) {
        const placeholders = { favorites: '搜索收藏的选题...', plan: '搜索创作计划...' };
        showSearchBar(placeholders[currentPage] || '搜索选题关键词...');
        // Reset search input value from variable
        const inp = document.getElementById('globalSearchInput');
        if (inp && inp.value !== searchText) inp.value = searchText;
      } else {
        hideSearchBar();
      }
      renderContent();
    }

    // Handle hash-based routing
    function handleHash() {
      if (!authToken) { currentPage = 'login'; render(); return; }
      const hash = window.location.hash.slice(1) || 'home';
      if (hash.startsWith('detail/')) {
        currentPage = 'detail';
        const id = hash.slice(7);
        const fromTopics = topics.find(t => String(t.id) === id);
        const fromAI = aiResults.find(t => String(t.id) === id);
        detailTopic = fromTopics || fromAI || null;
        if (!detailTopic) { currentPage = 'home'; detailTopic = null; window.location.hash = 'home'; }
      } else if (['home', 'favorites', 'ai', 'plan', 'editor'].includes(hash)) {
        if (hash === 'editor' && !editorTopic) {
          currentPage = 'plan';
          window.location.hash = 'plan';
          return;
        }
        currentPage = hash;
        detailTopic = null;
        if (hash !== 'editor') { editorTopic = null; showPublishModal = false; }
      } else {
        currentPage = 'home';
        detailTopic = null;
        window.location.hash = 'home';
      }
      render();
    }

    async function initApp() {
      if (authToken) {
        try {
          await loadUserData();
        } catch { logout(); return; }
      }
      handleHash();
    }
    window.addEventListener('hashchange', handleHash);
    window.addEventListener('DOMContentLoaded', initApp);
    if (document.readyState !== 'loading') initApp();
