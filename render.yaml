services:
  - type: web
    name: redbook-assistant
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        value: redbook-admin-key
      - key: PORT
        value: 3000
